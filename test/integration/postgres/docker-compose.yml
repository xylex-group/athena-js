services:
  postgres:
    image: postgres:16-alpine
    container_name: athena-js-introspection-postgres
    environment:
      POSTGRES_DB: athena_js
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d athena_js"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
